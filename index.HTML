<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirloskar Chiller Selection Software</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FIXED: Added the CDN link for html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --navy: #003366; --teal: #00818a; --light-bg: #f4f7f9; --border: #000; }
        body { font-family: 'Poppins', sans-serif; background: var(--light-bg); padding: 20px; color: #333; font-size: 11px; }
        
        .selection-box { 
            background: white; max-width: 750px; margin: 0 auto 30px; padding: 35px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--navy);
        }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--navy); }
        input, select { width: 100%; padding: 12px; border: 2px solid #e1e8ef; border-radius: 10px; font-size: 13px; box-sizing: border-box; }
        
        .gen-btn { 
            width: 100%; padding: 18px; background: linear-gradient(45deg, var(--navy), var(--teal));
            color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 25px;
            font-weight: 700; font-size: 16px; text-transform: uppercase; display: none;
        }
        .visible { display: block; }
        .hide-form { display: none; }

        .btn-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .dl-btn, .back-btn { width: 180px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; color: white; transition: 0.3s; }
        .dl-btn { background: linear-gradient(45deg, var(--navy), var(--teal)); }
        .back-btn { background: #6c757d; }

        .report-wrapper { width: 100%; max-width: 850px; margin: 0 auto; padding: 10px; }
        .report-container { background: white; padding: 15px; border-radius: 4px; }

        /* HEADER STYLING */
        .report-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
            padding-bottom: 10px; 
            border-bottom: 2px solid var(--navy); 
        }
        .logo-box img {
            max-height: 45px; 
            width: auto;
        }
        
        .section-title { 
            background: var(--navy); 
            color: white; 
            text-align: center; 
            padding: 6px 4px; 
            font-size: 9px; 
            font-weight: bold; 
            text-transform: uppercase; 
            border: 1px solid var(--navy); 
            margin-top: -1px; 
            width: calc(100% - 2px); 
            margin-left: 1px; 
            box-sizing: border-box; 
        }

        table { width: calc(100% - 2px); border-collapse: collapse; margin-bottom: 0; table-layout: fixed; border: 1px solid var(--border); margin-left: 1px; box-sizing: border-box; }
        th, td { border: none; padding: 3px 5px; font-size: 8px; }
        
        td.main-cell { border-right: 1px solid var(--border); padding: 0; vertical-align: top !important; } 
        
        .perf-table th, .perf-table td { border: 1px solid var(--border); padding: 3px; text-align: center; font-size: 8px; }
        .sub-header { background-color: #f1f3f5; font-weight: bold; }

        .label-cell { font-weight: bold; width: 22%; border-right: 1px solid var(--border); }
        .value-cell { width: 28%; border-right: 1px solid var(--border); }

        .inner-table { width: 100%; border: none; margin: 0; border-spacing: 0; border-collapse: collapse; }
        .inner-table td { border: none !important; padding: 2px 6px; vertical-align: top; }
        .bold { font-weight: bold; }

        .notes-box { border: 1px solid var(--border); border-top: none; height: 100px; margin-left: 1px; width: calc(100% - 2px); box-sizing: border-box; }

        /* Hides buttons during PDF generation to ensure clean output */
        @media print { .btn-container { display: none; } .report-wrapper { padding: 0; } }
    </style>
</head>
<body>

    <div class="selection-box" id="selection-form">
        <h2 style="text-align:center; color:var(--navy); margin-top:0;">Chiller Selection Software</h2>
        <div class="grid">
            <div class="input-group"><label>Client Name</label><input type="text" id="client" placeholder="Enter Client Name"></div>
            <div class="input-group"><label>Project Name</label><input type="text" id="project" placeholder="Enter Project Name"></div>
            <div class="input-group">
                <label>Model Name</label>
                <select id="model-select">
                    <option value="">Select Model...</option>
                    <option value="KAC011">KAC011.20</option>
                    <option value="KAC022">KAC022.20</option>
                    <option value="KAC044">KAC044.20</option>
                </select>
            </div>
            <div class="input-group">
                <label>Test Condition</label>
                <select id="condition-select">
                    <option value="">Select Condition...</option>
                    <option value="AHRI">AHRI Condition</option>
                    <option value="BEE">BEE Condition</option>
                </select>   
            </div>
        </div>
        <button id="gen-btn" class="gen-btn" onclick="generateReport()">Generate Selection Report</button>
    </div>

    <div id="output-wrapper" class="report-wrapper" style="display: none;">
        <div class="btn-container">
            <button class="back-btn" onclick="goBack()">← Back to Selection</button>
            <button class="dl-btn" onclick="downloadPDF()">Download Official PDF</button>
        </div>

                let obj = {};

                        <td class="main-cell"><table class="inner-table">
                            <tr><td>No. of Compressors:</td><td>${d.NumCompressors}</td></tr>
                            <tr><td>Hertz:</td><td>50 Hz</td></tr>
                            <tr><td>Volts:</td><td>415 V</td></tr>
                            <tr><td>Refrigerant:</td><td>${d.Refrigerant}</td></tr>
                        </table></td>
                        <td class="main-cell"><table class="inner-table">
                            <tr><td>Flow (m³/h):</td><td>${d.FlowDesign}</td></tr>
                            <tr><td>Water Entering Temp (°C):</td><td>${d.EI100}</td></tr>
                            <tr><td>Water Leaving Temp (°C):</td><td>${d.EO100}</td></tr>
                            <tr><td>Pressure Drop (kPa):</td><td>${d.PD100}</td></tr>
                            <tr><td>Fouling Factor (m².K/kW):</td><td>${d.FF}</td></tr>
                            <tr><td>Tube Material:</td><td>${d.Mat}</td></tr>
                        </table></td>
                        <td class="main-cell"><table class="inner-table">
                            <tr><td>Ambient Temp (°C):</td><td>${d.AM100}</td></tr>
                            <tr><td>No. of Fans:</td><td>${d.NumFans}</td></tr>
                            <tr><td>No. of Coils:</td><td>${d.NumCoils}</td></tr>
                            <tr><td>Altitude (m):</td><td>${d.Alt}</td></tr>
                        </table></td>
                    </tr>
                </table>

                <div class="section-title">${efficiencyHeader}</div>
                <table>
                    <tr>
                        <td class="main-cell"><table class="inner-table">
                            <tr><td class="bold">Capacity (kW)</td><td>${d.C100}</td></tr>
                            <tr><td class="bold">Power (kW)</td><td>${d.P100}</td></tr>
                            <tr><td class="bold">COP (kW/kW)</td><td>${d.COP100}</td></tr>
                            <tr><td class="bold">${ratingLabel}</td><td>${d.ResultVal}</td></tr>
                        </table></td>
                        <td class="main-cell"><table class="inner-table">
                            <tr><td>75% Load COP:</td><td>${d.COP75}</td></tr>
                            <tr><td>50% Load COP:</td><td>${d.COP50}</td></tr>
                            <tr><td>25% Load COP:</td><td>${d.COP25}</td></tr>
                            ${starRatingRow}
                        </table></td>
                        <td class="main-cell"><table class="inner-table">${rlaHtml}</table></td>
                    </tr>
                </table>

                <div class="section-title">${performanceHeader}</div>
                <table class="perf-table">
                    <tr>
                        <th rowspan="2">Pt</th><th rowspan="2">% Load</th><th rowspan="2">Cap (kW)</th><th rowspan="2">Power (kW)</th><th rowspan="2">COP (kW/kW)</th><th rowspan="2">RLA (A)</th>
                        <th colspan="4" class="sub-header">Evaporator</th><th class="sub-header">Air Cooled Condenser</th>
                    </tr>
                    <tr><th>Flow (m³/h)</th><th>T In (°C)</th><th>T Out (°C)</th><th>Pd (kPa)</th><th>Amb Temp (°C)</th></tr>
                    <tr><td>1</td><td>100</td><td>${d.C100}</td><td>${d.P100}</td><td>${d.COP100}</td><td>${d.RLA100}</td><td>${d.F100}</td><td>12.0</td><td>7.0</td><td>${d.PD100}</td><td>35.0</td></tr>
                    <tr><td>2</td><td>75</td><td>${d.C75}</td><td>${d.P75}</td><td>${d.COP75}</td><td>${d.RLA75}</td><td>${d.F75}</td><td>10.75</td><td>7.0</td><td>${d.PD75}</td><td>27.0</td></tr>
                    <tr><td>3</td><td>50</td><td>${d.C50}</td><td>${d.P50}</td><td>${d.COP50}</td><td>${d.RLA50}</td><td>${d.F50}</td><td>9.50</td><td>7.0</td><td>${d.PD50}</td><td>19.0</td></tr>
                    <tr><td>4</td><td>25</td><td>${d.C25}</td><td>${d.P25}</td><td>${d.COP25}</td><td>${d.RLA25}</td><td>${d.F25}</td><td>8.25</td><td>7.0</td><td>${d.PD25}</td><td>13.0</td></tr>
                </table>

                ${elevatedSection}

                <div class="section-title">PHYSICAL DATA</div>
                <table>
                    <tr>
                        <td class="main-cell">
                            <div class="bold" style="padding: 4px; background:#f8f9fa;">OPTION 1</div>
                            <table class="inner-table">
                                <tr><td>Dimensions (LxWxH) (mm):</td><td>${d.L1}x${d.W1}x${d.H1}</td></tr>
                                <tr><td>Shipping Weight (kg):</td><td>${d.SW1}</td></tr>
                                <tr><td>Operating Weight (kg):</td><td>${d.OW1}</td></tr>
                                <tr><td>Ref. Charge (kg):</td><td>${d.RC1}</td></tr>
                            </table>
                        </td>
                        <td class="main-cell">
                            <div class="bold" style="padding: 4px; background:#f8f9fa;">OPTION 2</div>
                            <table class="inner-table">
                                <tr><td>Dimensions (LxWxH) (mm):</td><td>${d.L2}x${d.W2}x${d.H2}</td></tr>
                                <tr><td>Shipping Weight (kg):</td><td>${d.SW2}</td></tr>
                                <tr><td>Operating Weight (kg):</td><td>${d.OW2}</td></tr>
                                <tr><td>Oil Charge (L):</td><td>${d.OilCh}</td></tr>
                            </table>
                        </td>
                    </tr>
                </table>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function downloadPDF() {
            const e = document.getElementById('report-content');
            const opt = {
                margin: [0.4, 0.4, 0.4, 0.4],
                filename: 'Kirloskar_Selection_Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true, letterRendering: true }, 
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(e).save();
        }

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', validate));
        parseData();
    </script>
</body>
</html>
